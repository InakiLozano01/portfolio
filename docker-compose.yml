services:
  mongodb:
    image: mongo:8.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    command: ["mongod","--auth","--bind_ip_all"]
    env_file:
      - .env.mongo
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    networks: [portfolio_network]
    cpus: "1"
    mem_limit: 768m
    memswap_limit: 768m
    pids_limit: 256
    healthcheck:
      # mongo:8.0 has bash + timeout. /dev/tcp is a bash builtin (won't work in
      # /bin/sh on debian), so wrap in `bash -c`. Avoids spawning mongosh+Node.
      test: ["CMD", "bash", "-c", "timeout 3 bash -c '</dev/tcp/127.0.0.1/27017'"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 768m
          pids: 256

  redis:
    labels:
      - "autoheal=true"   # see /home/ubuntu/vps/server-admin/autoheal/
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks: [portfolio_network]
    cpus: "0.3"
    mem_limit: 256m
    memswap_limit: 256m
    pids_limit: 128
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }
    command: redis-server --save 60 1 --loglevel verbose
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256m
          pids: 128

  portfolio:
    labels:
      - "autoheal=true"   # see /home/ubuntu/vps/server-admin/autoheal/
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SKIP_DB_DURING_BUILD: "true"        # build-time only
        SKIP_REDIS_DURING_BUILD: "true"     # build-time only
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3000"
    volumes:
      - ./public/images:/app/public/images:rw
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks: [portfolio_network]
    cpus: "0.5"
    mem_limit: 512m
    memswap_limit: 512m
    pids_limit: 256
    env_file:
      - .env.production
    environment:                         # runtime overrides
      SKIP_DB_DURING_BUILD: "false"
      SKIP_REDIS_DURING_BUILD: "false"
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3000 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
          pids: 256

networks:
  portfolio_network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
